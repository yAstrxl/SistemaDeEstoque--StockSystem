<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <title>
        StockFree
    </title>
</head>

<body style="margin: 0; padding: 0; background-color: peachpuff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; ">

    <header class="mainHeader">
        <h1>
            StockFree
        </h1>
    </header>
    <main>
        <form action="login" method="post">
            <div class="content">
                <div class="contentArea">
                    <header>
                        <h1 class="logHeader">
                            Login
                        </h1>
                    </header>

                    <div>
                        <label class="userLabel">
                            Usuário
                        </label>
                        <input type="text" name="users" class="inputUser" />
                    </div>

                    <div>
                        <label class="passwordLabel">
                            Senha
                        </label>
                        <input type="password" name="passw" class="inputPassword" />
                    </div>

                    <div class="inputbutton">
                        <button type="submit" class="button">
                            Entrar
                        </button>
                    </div>
                </div>
            </div>
        </form>
    </main>
    <footer></footer>
</body>

</html>
