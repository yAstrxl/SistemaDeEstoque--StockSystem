<html>
    <head>
        <title>StockFree | Cadastro</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="../css/reset.css">
        <link rel="stylesheet" href="../css/color.css">
        <link rel="stylesheet" href="../css/cadastro.css">
    </head>
    <body>
        <header id="header">
            <h1 id="tituloCadastro">
                STOCKFREE
            </h1>
            <nav>
                <ul>
                    <li>
                        <a href="#">
                            Inicio
                        </a>
                    </li>
                    <li>
                        <a href="#">
                            Gerenciamento
                        </a>
                    </li>    
                </ul>
            </nav>
        </header>
        <main id = "main">
            <form action="/cadastro" method="post">
                <div class="container">
                    <div class="dadosPessoais">
                        <label for="nome">Nome</label>
                        <input type="text" name="nome" id="nome" placeholder="Digite o seu nome"/>
                        <label for="sobrenome">Sobrenome</label>
                        <input type="text" name="sobrenome" id="sobrenome" placeholder="Digite o seu sobrenome"/>
                        <label for="matricula">Matricula</label>
                        <input type="text" name="matricula" id="matricula" placeholder="Digite a sua matricula"/>
                        <label for="cpf">CPF</label>
                        <input type="text" name="cpf" id="cpf" placeholder="Digite o seu CPF"/>
                        <p>Sexo</p>
                        <select name="sexo">
                            <option value="">Selecione o Sexo</option>
                            <option value="1">masculino</option>
                            <option value="2">feminino</option>
                        </select>
                        <label for="dtaNascimento" id="dtaNascimento">Data de Nascimento</label>
                        <input type="date" name="dtaNascimento" id="dtaNascimento" />
                        <label for="email">E-mail</label>
                        <input type="email" name="email" id="email" placeholder="xxxxxxxxxx@xxxx.xxx.xx"/>
                        <label for="telefone">Telefone</label>
                        <input type="tel" name="telefone" id="telefone" placeholder="(00)0 0000-0000"/>
                        <label for="funcao">Função</label>
                        <input type="text" name="funcao" id="funcao"/>
                    </div>
                    <div class="containerEndereco">
                        <label for="cep">CEP</label>
                        <input type="text" name="cep" id="cep"/>
                        <label for="cidade">Cidade</label>
                        <input type="text" name="cidade" id="cidade"/>
                        <label for="rua">Rua</label>
                        <input type="text" name="rua" id="rua"/>
                        <label for="bairro">Bairro</label>
                        <input type="text" name="bairro" id="bairro"/>
                        <label for="complemento">Complemento</label>
                        <input type="text" name="complemento" id="complemento"/>
                        <label for="numero">Número</label>
                        <input type="text" name="numero" id="numero"/>
                        <label for="estado">Estado</label>
                        <input type="text" name="estado" id="estado"/>
                    </div>
                    <div class="btn">
                        <button type="submit">Cadastrar</button> 
                    </div>
                </div>
            </form>
        </main>
    </body>
</html>
