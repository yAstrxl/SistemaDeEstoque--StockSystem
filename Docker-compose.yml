version: '3.8'

services:
  db:
    image: mysql:8
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: cimatec
      MYSQL_DATABASE: sk_db
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db:/docker-entrypoint-initdb.d
      
  app:
    build: .
    container_name: app-estoque
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  db_data: